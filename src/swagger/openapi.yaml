openapi: 3.0.3
info:
  title: Travellle API
  description: REST API for Travellle travel planning app
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: plans
    description: Travel plan operations
  - name: pins
    description: Pin operations on plans
  - name: notes
    description: Note operations on pins
  - name: spots
    description: Spot search operations
paths: {}
components:
  schemas:
    Error:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "an error occurred"
    Spot:
      type: object
      required:
        - place_id
        - name
        - address
        - latitude
        - longitude
      properties:
        place_id:
          type: string
          description: Google Places API place ID
          example: "ChIJ51cu8IcbXWARiRtXIothAS4"
        name:
          type: string
          example: "Tokyo Tower"
        address:
          type: string
          example: "4 Chome-2-8 Shibakoen, Minato City, Tokyo 105-0011"
        latitude:
          type: number
          format: double
          example: 35.6586
        longitude:
          type: number
          format: double
          example: 139.7454
    SpotSearchResponse:
      type: object
      required:
        - spots
      properties:
        spots:
          type: array
          items:
            $ref: '#/components/schemas/Spot'
