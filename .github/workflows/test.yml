name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Run unit tests
        working-directory: src
        run: go test -v -race ./...
